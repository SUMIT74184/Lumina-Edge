server:
  port: 8080

spring:
  application:
    name: lumina-edge-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/lumina_edge
    username: lumina
    password: lumina
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
